<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — Meridian Markets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --void:#04060f; --deep:#070b18; --surface:#0c1220; --elevated:#111827;
            --border:#1a2540; --border2:#243050;
            --gold:#c9a84c; --gold2:#e8c97a;
            --cyan:#00e5ff; --green:#00ff88; --red:#ff3b5c;
            --text:#e2e8f8; --muted:#4a5a7a; --muted2:#6a7a9a;
            --mono:'JetBrains Mono',monospace; --display:'Syne',sans-serif;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body {
            font-family: var(--display);
            background: var(--void);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
        body::after {
            content:'';
            position:fixed;
            inset:0;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.008) 2px,rgba(0,229,255,0.008) 4px);
            pointer-events:none;
        }
        .card {
            position: relative;
            z-index: 10;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 80px rgba(201,168,76,0.05);
        }
        .logo {
            font-family: var(--display);
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .logo-mark {
            width: 28px;
            height: 28px;
            border: 1.5px solid var(--gold);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--gold);
            font-weight: 700;
        }
        .logo span { color: var(--gold); }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: var(--muted2); font-size: 14px; margin-bottom: 32px; font-family: var(--mono); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); margin-bottom: 8px; font-family: var(--mono); }
        input {
            width: 100%;
            background: var(--elevated);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus {
            border-color: rgba(201,168,76,0.5);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
        }
        input::placeholder { color: var(--muted); }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--void);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: var(--display);
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .signup-link { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted2); font-family: var(--mono); }
        .signup-link a { color: var(--gold); text-decoration: none; font-weight: 500; }
        .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; font-family: var(--mono); }
        .alert-error { background: rgba(255,59,92,0.1); border: 1px solid rgba(255,59,92,0.3); color: var(--red); }
        .alert-success { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold); }
    </style>
</head>
<body>
<div class="card">
    <a href="/" class="logo">
        <div class="logo-mark">M</div>
        Meridian <span>Markets</span>
    </a>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to your Meridian Markets account.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Your password" required>
        </div>
        <button type="submit" class="btn">Log In</button>
    </form>

    <div class="signup-link">
        Don't have an account? <a href="/signup">Sign up free</a>
    </div>
</div>
</body>
</html>
