<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MarketPulse AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --dark: #0a0f1e; --darker: #060b14; --accent: #00d4aa;
            --text: #e8edf5; --muted: #6b7a99; --card: #111827; --border: #1e2d45;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
        .card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
        }
        .logo {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            color: var(--accent);
            text-decoration: none;
            display: block;
            margin-bottom: 32px;
        }
        .logo span { color: var(--text); }
        h1 { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
        input, select {
            width: 100%;
            background: var(--darker);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
            -webkit-appearance: none;
        }
        input:focus, select:focus { border-color: var(--accent); }
        input::placeholder { color: var(--muted); }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--darker);
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn:hover { background: #00bfa0; }
        .login-link { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
        .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
        .alert-error { background: rgba(255,92,122,0.1); border: 1px solid rgba(255,92,122,0.3); color: #ff5c7a; }
        .level-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
        .level-card input[type="radio"] { display: none; }
        .level-card label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 8px;
            background: var(--darker);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            text-align: center;
            transition: all 0.2s;
            margin: 0;
        }
        .level-card input[type="radio"]:checked + label {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0,212,170,0.05);
        }
        .level-card label .icon { font-size: 20px; }
    </style>
</head>
<body>
<div class="card">
    <a href="/" class="logo">Market<span>Pulse</span> AI</a>
    <h1>Create your account</h1>
    <p class="subtitle">Free forever. Donate to unlock AI features.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST" action="/signup">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" placeholder="John Smith" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="At least 8 characters" required>
        </div>
        <div class="form-group">
            <label>Experience Level</label>
            <div class="level-cards">
                <div class="level-card">
                    <input type="radio" name="experience_level" id="beginner" value="beginner" checked>
                    <label for="beginner">
                        <span class="icon">🌱</span>
                        Beginner
                    </label>
                </div>
                <div class="level-card">
                    <input type="radio" name="experience_level" id="intermediate" value="intermediate">
                    <label for="intermediate">
                        <span class="icon">📈</span>
                        Intermediate
                    </label>
                </div>
                <div class="level-card">
                    <input type="radio" name="experience_level" id="advanced" value="advanced">
                    <label for="advanced">
                        <span class="icon">🎯</span>
                        Advanced
                    </label>
                </div>
            </div>
        </div>
        <button type="submit" class="btn">Create Free Account</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Log in</a>
    </div>
</div>
</body>
</html>
